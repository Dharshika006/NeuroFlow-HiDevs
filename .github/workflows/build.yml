name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Crucial fix for the GHCR permission error:
permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    name: Lint & Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-state-environment: true
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff pytest

      - name: Run Ruff Check (Linter)
        # Note: If there are unfixable errors, this will fail gracefully or show you what needs fixing
        run: ruff check backend/

      - name: Run Pytest
        run: python -m pytest tests/unit -v

  build-and-push:
    name: Build & Push Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: False # Set to false for testing, change to true when ready to push
          # Hardcoded with your specific account name 'dharshika006' and matching your image tags
          tags: |
            ghcr.io/dharshika006/neuroflow-hidevs/api:latest
            ghcr.io/dharshika006/neuroflow-hidevs/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
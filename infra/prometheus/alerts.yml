groups:
  - name: neuroflow

    rules:

      - alert: HighEvaluationFailureRate
        expr: rate(neuroflow_queries_total{status="error"}[5m]) > 0.1
        for: 5m

      - alert: CircuitBreakerOpen
        expr: neuroflow_circuit_breakers_open > 0
        for: 1m

      - alert: EvaluationScoreDegraded
        expr: neuroflow_eval_overall < 0.65
        for: 15m

      - alert: QueueDepthHigh
        expr: neuroflow_queue_depth > 50
        for: 5m